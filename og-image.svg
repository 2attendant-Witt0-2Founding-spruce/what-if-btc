<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111317"/>

  <!-- Subtle grid -->
  <g stroke="#1a1d24" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- WhatIfBtc wordmark -->
  <text x="600" y="280" font-family="Helvetica Neue, Arial, sans-serif" font-size="96" font-weight="bold" fill="#FFFFFF" text-anchor="middle">WhatIfBtc</text>

  <!-- Tagline -->
  <text x="600" y="360" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" fill="#FF9900" text-anchor="middle">Calculate the Millions You Never Made</text>

  <!-- Divider -->
  <line x1="480" y1="410" x2="720" y2="410" stroke="#FF9900" stroke-width="1" opacity="0.4"/>

  <!-- URL -->
  <text x="600" y="445" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle">whatifbtc.com</text>
</svg>
